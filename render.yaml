services:
  - type: web
    name: atmosphere-analyzer-api
    runtime: python
    rootDir: atmosphere-analyzer/backend
    plan: free
    buildCommand: ./build.sh
    startCommand: daphne -b 0.0.0.0 -p $PORT atmosphere_analyzer.asgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.6"

  - type: web
    name: atmosphere-analyzer-dashboard
    runtime: static
    rootDir: atmosphere-analyzer/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        sync: false
